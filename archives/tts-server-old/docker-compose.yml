services:
  tts-server:
    build: .
    ports:
      - "5111:5111"
    volumes:
      - kokoro-models:/app/models    # Cached model weights persist across rebuilds
    environment:
      - PYTORCH_ENABLE_MPS_FALLBACK=1
    # Uncomment for NVIDIA GPU passthrough:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           capabilities: [gpu]

volumes:
  kokoro-models:
