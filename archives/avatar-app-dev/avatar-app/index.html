<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe AI Partner</title>
  <script src="/lib/live2dcubismcore.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    #avatar-container { width: 100%; height: 100%; position: relative; }
    #speech-bubble {
      display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: white; padding: 12px 20px; border-radius: 16px;
      font-family: system-ui; font-size: 14px; max-width: 80%; text-align: center;
      z-index: 100;
    }
    #speech-bubble.visible { display: block; }
    #context-menu {
      display: none; position: fixed; background: rgba(30,30,30,0.95); color: white;
      border-radius: 8px; padding: 4px 0; min-width: 180px; z-index: 200;
      font-family: system-ui; font-size: 13px; backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #context-menu.visible { display: block; }
    #context-menu .item { padding: 8px 16px; cursor: pointer; }
    #context-menu .item:hover { background: rgba(255,255,255,0.1); }
    #context-menu .separator { height: 1px; background: rgba(255,255,255,0.1); margin: 4px 0; }
    #context-menu .submenu { position: relative; }
    #context-menu .submenu-content {
      display: none; position: absolute; left: 100%; top: 0;
      background: rgba(30,30,30,0.95); border-radius: 8px; padding: 4px 0;
      min-width: 160px; backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #context-menu .submenu:hover .submenu-content { display: block; }
  </style>
</head>
<body>
  <div id="avatar-container"></div>
  <div id="speech-bubble"></div>
  <div id="context-menu"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
