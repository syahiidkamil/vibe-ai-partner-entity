<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 280px; height: 400px; background: transparent; user-select: none; overflow: hidden; }
    #container { width: 280px; height: 400px; position: relative; -webkit-app-region: drag; }
    canvas { display: block; position: absolute; top: 0; left: 0; }
    #bg-panel {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 240px; height: 360px; background: rgba(128,128,128,0.12); border-radius: 20px 20px 10px 10px;
    }
    #speech-bubble {
      position: absolute; top: 5px; left: 50%; transform: translateX(-50%);
      background: white; border: 2px solid #ff8faf; border-radius: 14px;
      padding: 6px 12px; font-family: 'Segoe UI', sans-serif; font-size: 11px;
      max-width: 260px; text-align: center; opacity: 0; transition: opacity 0.3s;
      z-index: 10; pointer-events: none; color: #5a2a4a;
      display: -webkit-box; line-clamp: 3; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    #speech-bubble::after {
      content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
      border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 8px solid #ff8faf;
    }
    #speech-bubble.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="container">
    <div id="bg-panel"></div>
    <div id="speech-bubble"></div>
    <canvas id="canvas"></canvas>
  </div>

  <script>
    const THREE = require('three');
    const fs = require('fs');
    const params = new URLSearchParams(window.location.search);
    const SERVER_PORT = params.get('port') || '5111';
    const speechBubble = document.getElementById('speech-bubble');
    const canvas = document.getElementById('canvas');

    // ─── Gradient midpoint colors ──────────────────
    const gradientColors = {
      'url(#hairGrad)': '#CBB4E0',
      'url(#hairBackGrad)': '#A791C3',
      'url(#eyeGrad)': '#9975B0',
      'url(#bodyGrad)': '#F5FAFD'
    };

    // ─── SVG Path → THREE.Shape ────────────────────
    function parseSVGPath(d) {
      const shapes = [];
      let cur = null, cx = 0, cy = 0, sx = 0, sy = 0;
      const tokens = d.match(/[a-zA-Z][^a-zA-Z]*/g) || [];
      for (const token of tokens) {
        const cmd = token[0];
        const nums = (token.slice(1).match(/-?\d+\.?\d*/g) || []).map(Number);
        switch (cmd) {
          case 'M':
            if (cur) shapes.push(cur);
            cur = new THREE.Shape();
            cx = nums[0]; cy = nums[1]; sx = cx; sy = cy;
            cur.moveTo(cx, -cy);
            break;
          case 'L':
            cx = nums[0]; cy = nums[1];
            cur.lineTo(cx, -cy);
            break;
          case 'C':
            cur.bezierCurveTo(nums[0], -nums[1], nums[2], -nums[3], nums[4], -nums[5]);
            cx = nums[4]; cy = nums[5];
            break;
          case 'Q':
            cur.quadraticCurveTo(nums[0], -nums[1], nums[2], -nums[3]);
            cx = nums[2]; cy = nums[3];
            break;
          case 'Z': case 'z':
            cur.lineTo(sx, -sy);
            break;
        }
      }
      if (cur) shapes.push(cur);
      return shapes;
    }

    function ellipseShape(cx, cy, rx, ry, seg = 48) {
      const s = new THREE.Shape();
      for (let i = 0; i <= seg; i++) {
        const a = (i / seg) * Math.PI * 2;
        const x = cx + Math.cos(a) * rx, y = -(cy + Math.sin(a) * ry);
        if (i === 0) s.moveTo(x, y); else s.lineTo(x, y);
      }
      return s;
    }

    function resolveColor(fill, opacity) {
      if (!fill || fill === 'none') return null;
      if (gradientColors[fill]) fill = gradientColors[fill];
      return { color: new THREE.Color(fill), opacity: opacity !== undefined ? opacity : 1 };
    }

    // ─── Layer definitions ─────────────────────────
    const layers = [];
    const D = 6;

    function addPath(d, fill, z, depth, opacity, stroke, sw, tag) {
      if (fill && fill !== 'none') {
        const c = resolveColor(fill, opacity);
        if (c) layers.push({ shapes: parseSVGPath(d), ...c, depth: depth || D, z, tag });
      }
      if (stroke && stroke !== 'none') {
        const c = resolveColor(stroke, opacity);
        if (c) layers.push({ strokePath: d, strokeWidth: sw || 2, ...c, z: z + 0.5, tag });
      }
    }
    function addEllipse(cx, cy, rx, ry, fill, z, depth, opacity, tag) {
      const c = resolveColor(fill, opacity);
      if (c) layers.push({ shapes: [ellipseShape(cx, cy, rx, ry)], ...c, depth: depth || 1, z, tag });
    }
    function addCircle(cx, cy, r, fill, z, depth, opacity, tag) { addEllipse(cx, cy, r, r, fill, z, depth, opacity, tag); }

    // Hair back (deepest layer)
    addPath("M 70 150 C 20 200 10 300 40 400 L 240 400 C 270 300 260 200 210 150 Z", 'url(#hairBackGrad)', 0, D + 4);
    // Body
    addPath("M 125 275 Q 140 295 155 275 L 230 315 C 255 330 270 370 270 400 L 10 400 C 10 370 25 330 50 315 Z", 'url(#bodyGrad)', 8, D + 2);
    // Neck
    addPath("M 125 250 L 155 250 L 155 285 L 125 285 Z", '#E8C9B5', 14, D);
    // Collar
    addPath("M 125 275 Q 140 295 155 275 L 195 325 Q 140 345 85 325 Z", '#A9CCE3', 16, 3);
    addPath("M 120 285 L 185 320 Q 140 335 95 320 Z", null, 18, 1, 1, '#FFFFFF', 2);
    // Ribbon
    addPath("M 140 315 L 120 340 L 135 340 Z", '#F5B7B1', 18, 3);
    addPath("M 140 315 L 160 340 L 145 340 Z", '#F5B7B1', 18, 3);
    addCircle(140, 315, 6, '#F1948A', 20, 3);
    // Face (thick — the main 3D mass)
    addPath("M 65 160 C 65 235 100 265 140 270 C 180 265 215 235 215 160 C 215 100 180 85 140 85 C 100 85 65 100 65 160 Z", '#FFE5D4', 20, D + 8);
    // Blush
    addEllipse(95, 215, 14, 7, '#FFB6C1', 36, 1, 0.7);
    addEllipse(185, 215, 14, 7, '#FFB6C1', 36, 1, 0.7);
    // Eye whites
    addEllipse(100, 198, 15, 20, '#FFFFFF', 32, 4, undefined, 'eye');
    addEllipse(180, 198, 15, 20, '#FFFFFF', 32, 4, undefined, 'eye');
    // Iris
    addEllipse(100, 198, 12, 17, 'url(#eyeGrad)', 38, 3, undefined, 'eye');
    addEllipse(180, 198, 12, 17, 'url(#eyeGrad)', 38, 3, undefined, 'eye');
    // Pupil
    addEllipse(100, 198, 6, 10, '#3B1255', 42, 2, undefined, 'eye');
    addEllipse(180, 198, 6, 10, '#3B1255', 42, 2, undefined, 'eye');
    // Highlights (pop forward)
    addEllipse(95, 188, 4, 6, '#FFFFFF', 46, 1.5, undefined, 'eye');
    addCircle(107, 205, 2.5, '#FFFFFF', 46, 1.5, 0.9, 'eye');
    addEllipse(175, 188, 4, 6, '#FFFFFF', 46, 1.5, undefined, 'eye');
    addCircle(187, 205, 2.5, '#FFFFFF', 46, 1.5, 0.9, 'eye');
    // Eyelashes
    addPath("M 78 190 C 85 175 105 170 122 180", null, 48, 1, 1, '#3B1255', 4, 'eye');
    addPath("M 78 190 L 73 183", null, 48, 1, 1, '#3B1255', 3, 'eye');
    addPath("M 158 180 C 175 170 195 175 202 190", null, 48, 1, 1, '#3B1255', 4, 'eye');
    addPath("M 202 190 L 207 183", null, 48, 1, 1, '#3B1255', 3, 'eye');
    // Eyebrows
    addPath("M 85 160 Q 100 155 115 162", null, 44, 1, 1, '#A882CC', 2.5);
    addPath("M 165 162 Q 180 155 195 160", null, 44, 1, 1, '#A882CC', 2.5);
    // Mouth
    addPath("M 133 238 Q 140 245 147 238", null, 38, 1, 1, '#E5A4A4', 2.5, 'mouth');
    // Hair front (thick, in front of face)
    addPath("M 140 60 C 60 60 40 120 40 180 C 40 260 45 300 50 340 C 65 290 70 230 75 180 C 75 130 90 105 140 105 C 190 105 205 130 205 180 C 210 230 215 290 230 340 C 235 300 240 260 240 180 C 240 120 220 60 140 60 Z", 'url(#hairGrad)', 24, D + 10);
    // Bangs (pop forward from hair)
    addPath("M 75 130 Q 90 170 85 185 Q 100 150 115 120 Q 90 110 75 130 Z", 'url(#hairGrad)', 52, D + 2);
    addPath("M 115 120 Q 130 160 140 170 Q 150 160 165 120 Q 140 110 115 120 Z", 'url(#hairGrad)', 52, D + 2);
    addPath("M 205 130 Q 190 170 195 185 Q 180 150 165 120 Q 190 110 205 130 Z", 'url(#hairGrad)', 52, D + 2);
    // Hair shine
    addPath("M 70 115 Q 140 85 210 115 Q 215 105 205 95 Q 140 65 75 95 Q 65 105 70 115 Z", '#FFFFFF', 56, 1, 0.3);
    // Bow (frontmost)
    addPath("M 215 105 Q 235 85 250 100 Q 240 120 215 105 Z", '#FF8DA1', 58, 4);
    addPath("M 215 105 Q 195 85 180 100 Q 190 120 215 105 Z", '#FF8DA1', 58, 4);
    addPath("M 215 105 Q 225 135 235 145 Q 220 135 215 105 Z", '#FF8DA1', 58, 4);
    addCircle(215, 105, 6, '#FF4D6D', 62, 4);

    // ─── Three.js scene ────────────────────────────
    const W = 280, H = 400;
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(30, W / H, 0.1, 2000);
    camera.position.set(0, 0, 600);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x000000, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.85));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight.position.set(100, 100, 300);
    scene.add(dirLight);
    const backLight = new THREE.DirectionalLight(0xe8d0ff, 0.3);
    backLight.position.set(-100, 50, -200);
    scene.add(backLight);

    const avatarGroup = new THREE.Group();
    const eyeGroup = new THREE.Group();
    const mouthMeshes = [];
    scene.add(avatarGroup);

    const offsetX = -140, offsetY = 200;

    for (const layer of layers) {
      if (layer.strokePath) {
        const shapes = parseSVGPath(layer.strokePath);
        for (const shape of shapes) {
          const points = shape.getPoints(64);
          if (points.length < 2) continue;
          const vectors = points.map(p => new THREE.Vector3(p.x + offsetX, p.y + offsetY, layer.z));
          const curve = new THREE.CatmullRomCurve3(vectors, false);
          const geo = new THREE.TubeGeometry(curve, Math.max(points.length * 2, 16), layer.strokeWidth * 0.5, 6, false);
          const mat = new THREE.MeshStandardMaterial({
            color: layer.color, roughness: 0.5, metalness: 0,
            transparent: layer.opacity < 1, opacity: layer.opacity
          });
          const mesh = new THREE.Mesh(geo, mat);
          if (layer.tag === 'eye') eyeGroup.add(mesh);
          else if (layer.tag === 'mouth') { mouthMeshes.push(mesh); avatarGroup.add(mesh); }
          else avatarGroup.add(mesh);
        }
      } else if (layer.shapes) {
        for (const shape of layer.shapes) {
          try {
            const geo = new THREE.ExtrudeGeometry(shape, {
              depth: layer.depth, bevelEnabled: true,
              bevelThickness: 1.5, bevelSize: 1.0, bevelSegments: 4, curveSegments: 24
            });
            geo.translate(offsetX, offsetY, layer.z);
            const mat = new THREE.MeshStandardMaterial({
              color: layer.color, roughness: 0.55, metalness: 0,
              transparent: layer.opacity < 1, opacity: layer.opacity, side: THREE.DoubleSide
            });
            const mesh = new THREE.Mesh(geo, mat);
            if (layer.tag === 'eye') eyeGroup.add(mesh);
            else if (layer.tag === 'mouth') { mouthMeshes.push(mesh); avatarGroup.add(mesh); }
            else avatarGroup.add(mesh);
          } catch (e) {}
        }
      }
    }

    // Add eye group to avatar
    avatarGroup.add(eyeGroup);

    // ─── Open mouth mesh (ellipse, hidden by default) ──
    const openMouthShape = ellipseShape(140, 243, 10, 5);
    const openMouthGeo = new THREE.ExtrudeGeometry(openMouthShape, {
      depth: 1.5, bevelEnabled: true, bevelThickness: 0.3, bevelSize: 0.2, bevelSegments: 3, curveSegments: 24
    });
    openMouthGeo.translate(offsetX, offsetY, 38);
    const openMouthMat = new THREE.MeshStandardMaterial({ color: 0xd4727e, roughness: 0.3, side: THREE.DoubleSide });
    const openMouthMesh = new THREE.Mesh(openMouthGeo, openMouthMat);
    openMouthMesh.scale.y = 0.01;
    avatarGroup.add(openMouthMesh);

    // Eye blink pivot
    const eyeCenterY = -198 + offsetY;

    // ─── Animation ─────────────────────────────────
    let mouthOpenness = 0;
    let blinkTimer = 0;
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      const t = clock.getElapsedTime();

      // Subtle idle sway
      avatarGroup.rotation.y = Math.sin(t * 0.5) * 0.08;
      avatarGroup.position.y = Math.sin(t * 1.5) * 0.3;

      // ─── Eye blink ──────────────────────────────
      blinkTimer += dt;
      let eyeScaleY = 1;
      if (blinkTimer > 3.5) {
        const p = blinkTimer - 3.5;
        if (p < 0.07) eyeScaleY = 1 - (p / 0.07);
        else if (p < 0.14) eyeScaleY = (p - 0.07) / 0.07;
        else blinkTimer = Math.random() * 1.5; // randomize next blink
      }
      // Scale eye group around eye center Y
      eyeGroup.scale.y = eyeScaleY;
      eyeGroup.position.y = eyeCenterY * (1 - eyeScaleY);

      // ─── Mouth lip sync ─────────────────────────
      for (const m of mouthMeshes) {
        m.visible = mouthOpenness < 0.05;
      }
      // Only scale Y downward (open), keep X steady
      openMouthMesh.scale.y = Math.max(0.01, mouthOpenness * 1.2);
      openMouthMesh.scale.x = 1;

      renderer.render(scene, camera);
    }
    animate();

    // ─── Audio queue + lip sync ────────────────────
    let audioCtx = null;
    let analyser = null;
    let lipSyncActive = false;
    let smoothedMouth = 0;
    let playQueue = [];
    let isPlaying = false;

    function startLipSync() {
      if (lipSyncActive) return;
      lipSyncActive = true;
      const dataArray = new Uint8Array(analyser.fftSize);
      function update() {
        if (!lipSyncActive) return;
        analyser.getByteTimeDomainData(dataArray);
        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) { const v = (dataArray[i] - 128) / 128; sum += v * v; }
        const rms = Math.sqrt(sum / dataArray.length);
        const gated = rms < 0.02 ? 0 : rms;
        const target = Math.min(Math.sqrt(gated * 8) * 1.2, 1);
        if (target > smoothedMouth) smoothedMouth += (target - smoothedMouth) * 0.8;
        else smoothedMouth += (target - smoothedMouth) * 0.3;
        mouthOpenness = smoothedMouth;
        requestAnimationFrame(update);
      }
      update();
    }

    function stopLipSync() { lipSyncActive = false; smoothedMouth = 0; mouthOpenness = 0; }

    function processQueue() {
      if (playQueue.length === 0) {
        isPlaying = false; stopLipSync();
        setTimeout(() => { if (!isPlaying) speechBubble.classList.remove('visible'); }, 500);
        return;
      }
      isPlaying = true;
      const { path, text } = playQueue.shift();
      if (!audioCtx) {
        audioCtx = new AudioContext();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        analyser.connect(audioCtx.destination);
      }
      if (text) { speechBubble.textContent = text; speechBubble.classList.add('visible'); }
      const audio = new Audio(path);
      const source = audioCtx.createMediaElementSource(audio);
      source.connect(analyser);
      startLipSync();
      audio.addEventListener('ended', () => { try { fs.unlinkSync(path); } catch {} processQueue(); });
      audio.addEventListener('error', () => { try { fs.unlinkSync(path); } catch {} processQueue(); });
      audio.play().catch(() => { try { fs.unlinkSync(path); } catch {} processQueue(); });
    }

    function queueAudio(path, text) { playQueue.push({ path, text }); if (!isPlaying) processQueue(); }

    // ─── Feelings ──────────────────────────────────
    function setFeeling(name) { /* TODO: animate eye/mouth layers */ }

    // ─── WebSocket ─────────────────────────────────
    function connectStatusWS() {
      const ws = new WebSocket(`ws://localhost:${SERVER_PORT}/ws/status`);
      ws.onmessage = (e) => { const m = JSON.parse(e.data); if (m.type === 'feeling') setFeeling(m.name); };
      ws.onclose = () => setTimeout(connectStatusWS, 2000);
      ws.onerror = () => ws.close();
    }
    function connectAudioWS() {
      const ws = new WebSocket(`ws://localhost:${SERVER_PORT}/ws/audio`);
      ws.onmessage = (e) => { const m = JSON.parse(e.data); if (m.type === 'audio') queueAudio(m.path, m.text); };
      ws.onclose = () => setTimeout(connectAudioWS, 2000);
      ws.onerror = () => ws.close();
    }
    connectStatusWS();
    connectAudioWS();
  </script>
</body>
</html>
