<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
    }
    #container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    /* Draggable top strip + window controls (−/+/✕, shared across renderers) */
    .titlebar {
      position: fixed; top: 0; left: 0; width: 100%; height: 28px; z-index: 100;
      -webkit-app-region: drag;
    }
    .titlebar:hover { background: linear-gradient(rgba(0,0,0,0.18), transparent); }
    .controls {
      /* glued to the avatar panel's right edge with a % offset, so it tracks the
         panel at any window size without a CSS transform (panel = 280/420 wide,
         centered → its right edge sits 16.667% in from the window's right edge) */
      position: fixed; top: 6px; right: calc(16.667% + 4px);
      display: flex; gap: 4px; z-index: 101; -webkit-app-region: no-drag;
    }
    .ctrl-btn {
      width: 18px; height: 18px; padding: 0; border: none; border-radius: 50%;
      background: rgba(0,0,0,0.3); color: #fff; font: 12px/18px sans-serif;
      text-align: center; cursor: pointer; opacity: 0;
      transition: opacity .2s, background .2s;
    }
    body:hover .ctrl-btn { opacity: 1; }
    .ctrl-btn:hover { background: rgba(0,0,0,0.55); }
    .close-btn:hover { background: #ff5470; }
    /* The avatar fills the window proportionally (panel = 66.667% wide, centered),
       so the −/+ controls just resize the OS window and Live2D refits — no scaling
       transform on the WebGL canvas (which ghosts on an unfocused transparent
       window and breaks click-through hit-testing). */
    #avatar-bg {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 66.667%;
      background: rgba(128, 128, 128, 0.15);
    }
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
    }
    #speech-bubble {
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 2px solid #333;
      border-radius: 12px;
      padding: 6px 12px;
      font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
      font-size: 12px;
      max-width: 380px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 10;
      pointer-events: none;
      display: -webkit-box;
      line-clamp: 5;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    #speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid #333;
    }
    #speech-bubble.visible { opacity: 1; }
  </style>
</head>
<body>
  <div class="titlebar" data-tauri-drag-region></div>
  <div class="controls">
    <button id="zoom-out" class="ctrl-btn" title="Smaller">−</button>
    <button id="zoom-in" class="ctrl-btn" title="Bigger">+</button>
    <button id="close-btn" class="ctrl-btn close-btn" title="Close VAPE">✕</button>
  </div>
  <div id="container">
    <div id="avatar-bg"></div>
    <div id="speech-bubble"></div>
    <canvas id="canvas"></canvas>
  </div>

  <script src="lib/live2dcubismcore.min.js"></script>
  <script src="node_modules/pixi.js/dist/browser/pixi.min.js"></script>
  <script src="node_modules/pixi-live2d-display/dist/cubism4.min.js"></script>

  <script>
    const Live2DModel = PIXI.live2d.Live2DModel;
    const MotionPreloadStrategy = PIXI.live2d.MotionPreloadStrategy;

    const speechBubble = document.getElementById('speech-bubble');
    const canvas = document.getElementById('canvas');

    // Served same-origin by the VAPE server; fall back to ?port= for dev.
    const params = new URLSearchParams(window.location.search);
    const WS_HOST = window.location.host || `localhost:${params.get('port') || '5111'}`;
    const WS_BASE = `ws://${WS_HOST}`;

    let model = null;
    let app = null;
    let baseW = 0, baseH = 0;       // intrinsic model size (scale 1), captured after load
    const PANEL_FRAC = 280 / 420;   // avatar panel width as a fraction of the window

    // Re-render Live2D at the current window size. Runs on launch and on every
    // window resize (the −/+ controls just resize the OS window). The model keeps
    // its aspect ratio and the canvas backing store is resized, so it stays crisp
    // at any size — no CSS transform on the WebGL canvas.
    function fitModel() {
      if (!app) return;
      const w = window.innerWidth, h = window.innerHeight;
      app.renderer.resize(w, h);
      if (!model || !baseW) return;
      const s = Math.min((w * PANEL_FRAC) / baseW, h / baseH) * 0.95;
      model.scale.set(s);
      model.x = w / 2;
      model.y = h * 0.45;
    }
    window.addEventListener('resize', fitModel);

    // ─── Expression map ────────────────────────────────────
    const EXPRESSION_MAP = {
      normal: 'Normal', happy: 'Happy', sad: 'Sad', angry: 'Angry',
      frustrated: 'Frustrated', curious: 'Curious', proud: 'Proud',
      anxious: 'Anxious', excited: 'Excited', calm: 'Calm',
      bored: 'Bored', guilty: 'Guilty', blushing: 'Blushing',
      surprised: 'Surprised',
    };

    const SELF_EXPRESSION_MAP = {
      nod: 0, headshake: 1, headtilt: 2, laugh: 3, giggle: 4,
      gasp: 5, think: 6, celebrate: 7, sweat: 8, wave: 9,
      bow: 10, starryeyes: 11,
    };

    function setExpression(name) {
      if (!model) return;
      const exprName = EXPRESSION_MAP[name];
      if (!exprName) return;
      const em = model.internalModel.motionManager.expressionManager;
      const idx = em?.definitions?.findIndex(d => d.Name === exprName);
      if (idx >= 0) model.expression(idx);
    }

    function playSelfExpression(name) {
      if (!model) return;
      const idx = SELF_EXPRESSION_MAP[name];
      if (idx === undefined) return;
      model.motion('SelfExpression', idx, 3);
    }

    // ─── Audio queue + lip sync via AnalyserNode ───────────
    // Shizuku's idle motions keyframe PARAM_MOUTH_OPEN_Y, so writing the
    // mouth value from a separate RAF loop loses the race — the motion
    // overwrites it inside the model's update step. Instead, we compute
    // smoothedMouth in RAF but apply it inside the 'beforeModelUpdate'
    // event the library emits after motions/expressions/physics, just
    // before the model renders. That's the only point where our value wins.
    let audioCtx = null;
    let analyser = null;
    let lipSyncActive = false;
    let smoothedMouth = 0;
    let playQueue = [];
    let isPlaying = false;

    function startLipSync() {
      if (lipSyncActive) return;
      lipSyncActive = true;
      const dataArray = new Uint8Array(analyser.fftSize);

      function update() {
        if (!lipSyncActive || !model) return;
        analyser.getByteTimeDomainData(dataArray);
        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) {
          const v = (dataArray[i] - 128) / 128;
          sum += v * v;
        }
        const rms = Math.sqrt(sum / dataArray.length);
        const gated = rms < 0.02 ? 0 : rms;
        const target = Math.min(Math.sqrt(gated * 8) * 1.2, 1);
        if (target > smoothedMouth) {
          smoothedMouth += (target - smoothedMouth) * 0.8;
        } else {
          smoothedMouth += (target - smoothedMouth) * 0.3;
        }
        requestAnimationFrame(update);
      }
      update();
    }

    function stopLipSync() {
      lipSyncActive = false;
      smoothedMouth = 0;
    }

    async function processQueue() {
      if (playQueue.length === 0) {
        isPlaying = false;
        stopLipSync();
        setTimeout(() => {
          if (!isPlaying) speechBubble.classList.remove('visible');
        }, 500);
        return;
      }

      isPlaying = true;
      const { url, text } = playQueue.shift();

      if (!audioCtx) {
        audioCtx = new AudioContext();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        analyser.connect(audioCtx.destination);
      }
      // Some webviews start the AudioContext suspended; resume before playing
      // or the analyser reads silence and the mouth never moves.
      if (audioCtx.state === 'suspended') {
        try { await audioCtx.resume(); } catch {}
      }

      if (text) {
        speechBubble.textContent = text;
        speechBubble.classList.add('visible');
      }

      const audio = new Audio(url);
      const source = audioCtx.createMediaElementSource(audio);
      source.connect(analyser);

      startLipSync();

      audio.addEventListener('ended', processQueue);
      audio.addEventListener('error', processQueue);
      audio.play().catch(processQueue);
    }

    function queueAudio(url, text) {
      playQueue.push({ url, text });
      if (!isPlaying) processQueue();
    }

    // ─── WebSocket connections ──────────────────────────────
    function connectStatusWS() {
      const ws = new WebSocket(`${WS_BASE}/ws/status`);
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'feeling') setExpression(msg.name);
        else if (msg.type === 'action') playSelfExpression(msg.name);
      };
      ws.onclose = () => setTimeout(connectStatusWS, 2000);
      ws.onerror = () => ws.close();
    }

    function connectAudioWS() {
      const ws = new WebSocket(`${WS_BASE}/ws/audio`);
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'audio') queueAudio(msg.url, msg.text);
      };
      ws.onclose = () => setTimeout(connectAudioWS, 2000);
      ws.onerror = () => ws.close();
    }

    // ─── Close button ──────────────────────────────────────
    function closeApp() {
      // Stop the server, then close the window (works in Electron, Tauri, browser).
      fetch('/api/shutdown', { method: 'POST' }).catch(() => {}).finally(closeWindow);
    }
    function closeWindow() {
      try {
        const t = window.__TAURI__;
        if (t) {
          const api = t.window || t.webviewWindow;
          const cur = api && (api.getCurrentWindow ? api.getCurrentWindow() : (api.getCurrent ? api.getCurrent() : null));
          if (cur && cur.close) { cur.close(); return; }
        }
      } catch (e) {}
      window.close();
    }
    document.getElementById('close-btn').addEventListener('click', closeApp);

    // ─── Resize (−/+) ──────────────────────────────────────
    // The shell resizes the OS window; the renderer re-renders Live2D at the new
    // pixel size (see fitModel). No CSS transform on the WebGL canvas — that
    // ghosts on an unfocused transparent window and offsets click-through
    // hit-testing. The chosen scale is remembered across restarts via localStorage
    // (per-origin, shared by both shells on http://localhost:<port>).
    const DESIGN_W = 420, DESIGN_H = 400;
    const SCALE_MIN = 0.6, SCALE_MAX = 1.8, SCALE_STEP = 0.15;
    let uiScale = parseFloat(localStorage.getItem('vape-scale'));
    if (!(uiScale >= SCALE_MIN && uiScale <= SCALE_MAX)) uiScale = 1;

    function applyScale() {
      const w = Math.round(DESIGN_W * uiScale);
      const h = Math.round(DESIGN_H * uiScale);
      if (window.vapeShell && window.vapeShell.resize) window.vapeShell.resize(w, h);
      else if (window.__TAURI__ && window.__TAURI__.core)
        window.__TAURI__.core.invoke('vape_resize', { width: w, height: h }).catch(() => {});
    }
    function setScale(next) {
      uiScale = Math.max(SCALE_MIN, Math.min(SCALE_MAX, Math.round(next * 100) / 100));
      localStorage.setItem('vape-scale', String(uiScale));
      applyScale();
    }
    document.getElementById('zoom-in').addEventListener('click', () => setScale(uiScale + SCALE_STEP));
    document.getElementById('zoom-out').addEventListener('click', () => setScale(uiScale - SCALE_STEP));
    applyScale(); // restore the remembered window size on launch (fitModel follows on resize)

    // Click-through everywhere except the chrome: the avatar body lets mouse
    // events pass to whatever is behind the window; the drag strip + controls
    // re-enable interaction while hovered. No-op outside Electron.
    document.querySelectorAll('.titlebar, .controls').forEach((el) => {
      el.addEventListener('mouseenter', () => window.vapeShell && window.vapeShell.setIgnoreMouse(false));
      el.addEventListener('mouseleave', () => window.vapeShell && window.vapeShell.setIgnoreMouse(true));
    });

    // Tauri can't forward mouse moves while click-through, so the renderer
    // reports its interactive rects and the shell hit-tests the cursor itself.
    if (window.__TAURI__ && window.__TAURI__.core) {
      const reportZones = () => {
        const zones = [...document.querySelectorAll('.titlebar, .controls')].map((el) => {
          const r = el.getBoundingClientRect();
          return [r.left, r.top, r.width, r.height];
        });
        window.__TAURI__.core.invoke('vape_set_zones', { zones }).catch(() => {});
      };
      reportZones();
      setTimeout(reportZones, 500);
      window.addEventListener('resize', reportZones);
    }

    // ─── Initialize Live2D ─────────────────────────────────
    async function init() {
      app = new PIXI.Application({
        view: canvas,
        transparent: true,
        width: window.innerWidth,
        height: window.innerHeight,
        resolution: window.devicePixelRatio || 1,
        autoDensity: true,
      });

      try {
        model = await Live2DModel.from('shizuku/runtime/shizuku.model3.json', {
          motionPreload: MotionPreloadStrategy.ALL,
        });

        model.anchor.set(0.5, 0.5);
        baseW = model.width;   // intrinsic size at scale 1, before we refit
        baseH = model.height;

        model.internalModel.eyeBlink = null;
        app.stage.addChild(model);
        model.motion('Idle', 0);
        fitModel(); // size the model + canvas to the current window

        // Apply lipsync mouth value at the only point that wins the frame:
        // after motions/expressions/physics have written params, just before
        // the model is sent to render. Idle motions keyframe the mouth, so
        // writing earlier loses the race.
        model.internalModel.on('beforeModelUpdate', () => {
          model.internalModel.coreModel.setParameterValueById('PARAM_MOUTH_OPEN_Y', smoothedMouth);
        });

        connectStatusWS();
        connectAudioWS();
      } catch (err) {
        document.body.innerHTML = `<div style="color:red;padding:20px;font-size:14px;">
          Failed to load model:<br>${err.message}
        </div>`;
      }
    }

    init();
  </script>
</body>
</html>
