<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 200px;
      height: 260px;
      background: transparent;
      user-select: none;
      overflow: hidden;
    }
    #container {
      width: 200px;
      height: 260px;
      position: relative;
    }
    /* Draggable top strip + close button (shared across renderers) */
    .titlebar {
      position: fixed; top: 0; left: 0; width: 100%; height: 28px; z-index: 100;
      -webkit-app-region: drag;
    }
    .titlebar:hover { background: linear-gradient(rgba(0,0,0,0.18), transparent); }
    .close-btn {
      /* anchored to the 170px-wide panel (centered, starts ~30px down), not the window edge */
      position: fixed; top: 35px; right: calc(50% - 79px); width: 18px; height: 18px; padding: 0;
      border: none; border-radius: 50%; background: rgba(0,0,0,0.3); color: #fff;
      font-size: 11px; line-height: 18px; text-align: center; cursor: pointer;
      z-index: 101; -webkit-app-region: no-drag; opacity: 0;
      transition: opacity .2s, background .2s;
    }
    body:hover .close-btn { opacity: 1; }
    .close-btn:hover { background: #ff5470; }
    #bg-panel {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 170px;
      height: 230px;
      background: rgba(128, 128, 128, 0.12);
      border-radius: 18px 18px 10px 10px;
    }
    #avatar-svg {
      position: absolute;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* ─── Speech bubble ─────────────────────────── */
    #speech-bubble {
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 2px solid #9b6bab;
      border-radius: 14px;
      padding: 6px 12px;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      font-size: 11px;
      max-width: 180px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 10;
      pointer-events: none;
      display: -webkit-box;
      line-clamp: 3;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: #4a2a5a;
    }
    #speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid #9b6bab;
    }
    #speech-bubble.visible { opacity: 1; }

    /* ─── Blink animation ───────────────────────── */
    @keyframes blink {
      0%, 93%, 100% { transform: scaleY(1); }
      95.5% { transform: scaleY(0.08); }
    }
    #eyes-group { animation: blink 3.5s infinite; transform-origin: center 198px; }

    /* ─── Feelings ──────────────────────────────── */
    /* happy — eyes become happy arcs */
    .feeling-happy #eyes-group { animation: none; }
    .feeling-happy .eye-white, .feeling-happy .iris, .feeling-happy .pupil-el,
    .feeling-happy .eye-highlight, .feeling-happy .eye-highlight-sm { display: none; }
    .feeling-happy #happy-eyes { display: block; }
    .feeling-happy #blush-left, .feeling-happy #blush-right { opacity: 0.9; }

    /* sad */
    .feeling-sad #eyes-group { animation: none; }
    .feeling-sad #eyebrow-left { transform: rotate(-8deg); transform-origin: 100px 160px; }
    .feeling-sad #eyebrow-right { transform: rotate(8deg); transform-origin: 180px 160px; }

    /* angry */
    .feeling-angry #eyebrow-left { transform: rotate(12deg) translateY(5px); transform-origin: 100px 160px; }
    .feeling-angry #eyebrow-right { transform: rotate(-12deg) translateY(5px); transform-origin: 180px 160px; }
    .feeling-angry .iris { fill: #8B2252; }

    /* surprised */
    .feeling-surprised #eyes-group { animation: none; }
    .feeling-surprised .eye-white { rx: 18; ry: 23; }
    .feeling-surprised .pupil-el { rx: 4; ry: 7; }

    /* excited */
    .feeling-excited .eye-white { rx: 18; ry: 23; }
    .feeling-excited #blush-left, .feeling-excited #blush-right { opacity: 0.9; }

    /* blushing */
    .feeling-blushing #eyes-group { animation: none; }
    .feeling-blushing #happy-eyes { display: block; }
    .feeling-blushing .eye-white, .feeling-blushing .iris, .feeling-blushing .pupil-el,
    .feeling-blushing .eye-highlight, .feeling-blushing .eye-highlight-sm { display: none; }
    .feeling-blushing #blush-left, .feeling-blushing #blush-right { opacity: 1; rx: 18; ry: 10; }

    /* calm */
    .feeling-calm .eye-white { ry: 14; }

    /* bored */
    .feeling-bored .eye-white { ry: 12; }
    .feeling-bored #eyes-group { animation: none; }

    /* curious */
    .feeling-curious .eye-white:first-child { rx: 18; ry: 23; }

    /* anxious */
    .feeling-anxious .pupil-el { rx: 4; ry: 6; }
    .feeling-anxious .eye-highlight { rx: 3; ry: 4; }

    /* proud */
    .feeling-proud .eye-white { ry: 16; }
    .feeling-proud #eyes-group { animation: none; }

    /* guilty */
    .feeling-guilty .iris { transform: translate(-3px, 3px); }
    .feeling-guilty .pupil-el { transform: translate(-3px, 3px); }

    /* frustrated */
    .feeling-frustrated #eyebrow-left { transform: rotate(8deg) translateY(3px); transform-origin: 100px 160px; }
    .feeling-frustrated #eyebrow-right { transform: rotate(-8deg) translateY(3px); transform-origin: 180px 160px; }

    /* Hidden by default, shown by feelings */
    #happy-eyes { display: none; }

    /* Transitions */
    .eye-white, .iris, .pupil-el, .eye-highlight { transition: all 0.3s; }
    #blush-left, #blush-right { transition: opacity 0.3s; }
    #eyebrow-left, #eyebrow-right { transition: transform 0.3s; }
  </style>
</head>
<body>
  <div class="titlebar" data-tauri-drag-region></div>
  <button id="close-btn" class="close-btn" title="Close VAPE">✕</button>
  <div id="container">
    <div id="bg-panel"></div>
    <div id="speech-bubble"></div>
    <svg id="avatar-svg" viewBox="0 0 280 400" width="180" height="257" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#E2D1F9"/>
          <stop offset="100%" stop-color="#B598C7"/>
        </linearGradient>
        <linearGradient id="hairBackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#C5B1DE"/>
          <stop offset="100%" stop-color="#8F71A8"/>
        </linearGradient>
        <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#5B2C6F"/>
          <stop offset="100%" stop-color="#D7BDE2"/>
        </linearGradient>
        <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#FFFFFF"/>
          <stop offset="100%" stop-color="#EBF5FB"/>
        </linearGradient>
      </defs>

      <!-- Hair back -->
      <path d="M 70 150 C 20 200 10 300 40 400 L 240 400 C 270 300 260 200 210 150 Z" fill="url(#hairBackGrad)"/>

      <!-- Neck -->
      <path d="M 125 250 L 155 250 L 155 285 L 125 285 Z" fill="#E8C9B5"/>

      <!-- Body / collar -->
      <path d="M 125 275 Q 140 295 155 275 L 230 315 C 255 330 270 370 270 400 L 10 400 C 10 370 25 330 50 315 Z" fill="url(#bodyGrad)"/>
      <path d="M 125 275 Q 140 295 155 275 L 195 325 Q 140 345 85 325 Z" fill="#A9CCE3"/>
      <path d="M 120 285 L 185 320 Q 140 335 95 320 Z" fill="none" stroke="#FFFFFF" stroke-width="2"/>

      <!-- Ribbon -->
      <path d="M 140 315 L 120 340 L 135 340 Z" fill="#F5B7B1"/>
      <path d="M 140 315 L 160 340 L 145 340 Z" fill="#F5B7B1"/>
      <circle cx="140" cy="315" r="6" fill="#F1948A"/>

      <!-- Face -->
      <path d="M 65 160 C 65 235 100 265 140 270 C 180 265 215 235 215 160 C 215 100 180 85 140 85 C 100 85 65 100 65 160 Z" fill="#FFE5D4"/>

      <!-- Blush -->
      <ellipse id="blush-left" cx="95" cy="215" rx="14" ry="7" fill="#FFB6C1" opacity="0.5"/>
      <ellipse id="blush-right" cx="185" cy="215" rx="14" ry="7" fill="#FFB6C1" opacity="0.5"/>

      <!-- Eyes group (for blink animation) -->
      <g id="eyes-group">
        <!-- Eye whites -->
        <ellipse class="eye-white" cx="100" cy="198" rx="15" ry="20" fill="#FFFFFF"/>
        <ellipse class="eye-white" cx="180" cy="198" rx="15" ry="20" fill="#FFFFFF"/>

        <!-- Irises -->
        <ellipse class="iris" cx="100" cy="198" rx="12" ry="17" fill="url(#eyeGrad)"/>
        <ellipse class="iris" cx="180" cy="198" rx="12" ry="17" fill="url(#eyeGrad)"/>

        <!-- Pupils -->
        <ellipse class="pupil-el" cx="100" cy="198" rx="6" ry="10" fill="#3B1255"/>
        <ellipse class="pupil-el" cx="180" cy="198" rx="6" ry="10" fill="#3B1255"/>

        <!-- Highlights -->
        <ellipse class="eye-highlight" cx="95" cy="188" rx="4" ry="6" fill="#FFFFFF"/>
        <circle class="eye-highlight-sm" cx="107" cy="205" r="2.5" fill="#FFFFFF" opacity="0.9"/>
        <ellipse class="eye-highlight" cx="175" cy="188" rx="4" ry="6" fill="#FFFFFF"/>
        <circle class="eye-highlight-sm" cx="187" cy="205" r="2.5" fill="#FFFFFF" opacity="0.9"/>

        <!-- Eyelashes -->
        <path d="M 78 190 C 85 175 105 170 122 180" fill="none" stroke="#3B1255" stroke-width="4" stroke-linecap="round"/>
        <path d="M 78 190 L 73 183" stroke="#3B1255" stroke-width="3" stroke-linecap="round"/>
        <path d="M 158 180 C 175 170 195 175 202 190" fill="none" stroke="#3B1255" stroke-width="4" stroke-linecap="round"/>
        <path d="M 202 190 L 207 183" stroke="#3B1255" stroke-width="3" stroke-linecap="round"/>

        <!-- Happy eyes (hidden by default, shown by feeling-happy) -->
        <g id="happy-eyes">
          <path d="M 85 198 Q 100 185 115 198" fill="none" stroke="#3B1255" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M 165 198 Q 180 185 195 198" fill="none" stroke="#3B1255" stroke-width="3.5" stroke-linecap="round"/>
        </g>
      </g>

      <!-- Eyebrows -->
      <path id="eyebrow-left" d="M 85 160 Q 100 155 115 162" fill="none" stroke="#A882CC" stroke-width="2.5" stroke-linecap="round"/>
      <path id="eyebrow-right" d="M 165 162 Q 180 155 195 160" fill="none" stroke="#A882CC" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Mouth (animated by lip sync) -->
      <path id="mouth" d="M 133 238 Q 140 245 147 238" fill="none" stroke="#E5A4A4" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Hair front -->
      <path d="M 140 60 C 60 60 40 120 40 180 C 40 260 45 300 50 340 C 65 290 70 230 75 180 C 75 130 90 105 140 105 C 190 105 205 130 205 180 C 210 230 215 290 230 340 C 235 300 240 260 240 180 C 240 120 220 60 140 60 Z" fill="url(#hairGrad)"/>

      <!-- Bangs -->
      <path d="M 75 130 Q 90 170 85 185 Q 100 150 115 120 Q 90 110 75 130 Z" fill="url(#hairGrad)"/>
      <path d="M 115 120 Q 130 160 140 170 Q 150 160 165 120 Q 140 110 115 120 Z" fill="url(#hairGrad)"/>
      <path d="M 205 130 Q 190 170 195 185 Q 180 150 165 120 Q 190 110 205 130 Z" fill="url(#hairGrad)"/>

      <!-- Hair shine -->
      <path d="M 70 115 Q 140 85 210 115 Q 215 105 205 95 Q 140 65 75 95 Q 65 105 70 115 Z" fill="#FFFFFF" opacity="0.3"/>

      <!-- Bow -->
      <path d="M 215 105 Q 235 85 250 100 Q 240 120 215 105 Z" fill="#FF8DA1"/>
      <path d="M 215 105 Q 195 85 180 100 Q 190 120 215 105 Z" fill="#FF8DA1"/>
      <path d="M 215 105 Q 225 135 235 145 Q 220 135 215 105 Z" fill="#FF8DA1"/>
      <circle cx="215" cy="105" r="6" fill="#FF4D6D"/>
    </svg>
  </div>

  <script>
    // Served same-origin by the VAPE server; fall back to ?port= for dev.
    const params = new URLSearchParams(window.location.search);
    const WS_HOST = window.location.host || `localhost:${params.get('port') || '5111'}`;
    const WS_BASE = `ws://${WS_HOST}`;

    const mouth = document.getElementById('mouth');
    const speechBubble = document.getElementById('speech-bubble');
    const container = document.getElementById('container');

    function setFeeling(name) {
      container.className = '';
      if (name && name !== 'normal') {
        container.classList.add(`feeling-${name}`);
      }
    }

    // ─── Audio queue + lip sync ────────────────────
    let audioCtx = null;
    let analyser = null;
    let lipSyncActive = false;
    let playQueue = [];
    let isPlaying = false;

    // Base mouth path (closed)
    const MOUTH_CLOSED = 'M 133 238 Q 140 245 147 238';

    function startLipSync() {
      if (lipSyncActive) return;
      lipSyncActive = true;
      const dataArray = new Uint8Array(analyser.fftSize);

      function update() {
        if (!lipSyncActive) return;
        analyser.getByteTimeDomainData(dataArray);
        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) {
          const v = (dataArray[i] - 128) / 128;
          sum += v * v;
        }
        const rms = Math.sqrt(sum / dataArray.length);
        const gated = rms < 0.02 ? 0 : rms;
        const openness = Math.min(Math.sqrt(gated * 8) * 1.2, 1);

        // Animate mouth path: wider and more open
        const w = 7 + openness * 8;
        const h = 2 + openness * 12;
        const d = `M ${140 - w} 238 Q 140 ${238 + h} ${140 + w} 238`;
        mouth.setAttribute('d', d);
        mouth.setAttribute('fill', openness > 0.15 ? '#E5A4A4' : 'none');
        mouth.setAttribute('stroke-width', openness > 0.15 ? '1.5' : '2.5');

        requestAnimationFrame(update);
      }
      update();
    }

    function stopLipSync() {
      lipSyncActive = false;
      mouth.setAttribute('d', MOUTH_CLOSED);
      mouth.setAttribute('fill', 'none');
      mouth.setAttribute('stroke-width', '2.5');
    }

    async function processQueue() {
      if (playQueue.length === 0) {
        isPlaying = false;
        stopLipSync();
        setTimeout(() => {
          if (!isPlaying) speechBubble.classList.remove('visible');
        }, 500);
        return;
      }

      isPlaying = true;
      const { url, text } = playQueue.shift();

      if (!audioCtx) {
        audioCtx = new AudioContext();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        analyser.connect(audioCtx.destination);
      }
      // Some webviews start the AudioContext suspended; resume before playing
      // or the analyser reads silence and the mouth never moves.
      if (audioCtx.state === 'suspended') {
        try { await audioCtx.resume(); } catch {}
      }

      if (text) {
        speechBubble.textContent = text;
        speechBubble.classList.add('visible');
      }

      const audio = new Audio(url);
      const source = audioCtx.createMediaElementSource(audio);
      source.connect(analyser);
      startLipSync();

      audio.addEventListener('ended', processQueue);
      audio.addEventListener('error', processQueue);
      audio.play().catch(processQueue);
    }

    function queueAudio(url, text) {
      playQueue.push({ url, text });
      if (!isPlaying) processQueue();
    }

    // ─── WebSocket ─────────────────────────────────
    function connectStatusWS() {
      const ws = new WebSocket(`${WS_BASE}/ws/status`);
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'feeling') setFeeling(msg.name);
      };
      ws.onclose = () => setTimeout(connectStatusWS, 2000);
      ws.onerror = () => ws.close();
    }

    function connectAudioWS() {
      const ws = new WebSocket(`${WS_BASE}/ws/audio`);
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'audio') queueAudio(msg.url, msg.text);
      };
      ws.onclose = () => setTimeout(connectAudioWS, 2000);
      ws.onerror = () => ws.close();
    }

    connectStatusWS();
    connectAudioWS();

    // ─── Close button ──────────────────────────────
    function closeApp() {
      fetch('/api/shutdown', { method: 'POST' }).catch(() => {}).finally(closeWindow);
    }
    function closeWindow() {
      try {
        const t = window.__TAURI__;
        if (t) {
          const api = t.window || t.webviewWindow;
          const cur = api && (api.getCurrentWindow ? api.getCurrentWindow() : (api.getCurrent ? api.getCurrent() : null));
          if (cur && cur.close) { cur.close(); return; }
        }
      } catch (e) {}
      window.close();
    }
    document.getElementById('close-btn').addEventListener('click', closeApp);
  </script>
</body>
</html>
