<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
    }
    #container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    /* Draggable top strip + window controls (−/+/✕, shared across renderers) */
    .titlebar {
      /* width matches the avatar panel (66.667%, centered) so the drag strip and
         its hint don't overflow the card into the transparent margins;
         translate3d also promotes it to a clean GPU layer during a drag. */
      position: fixed; top: 0; left: 50%; transform: translate3d(-50%, 0, 0);
      width: 66.667%; height: 28px; z-index: 100;
      -webkit-app-region: drag;
      /* Faint always-visible blackish hint + a frosted blur, so a first-time user
         can SEE where to grab me instead of guessing — the blur keeps the strip
         readable even when its tint matches whatever's behind it. Deepens on
         hover (the drag trigger). A white top strip line rides above the dark
         tint so the strip stays visible on dark backdrops (VS Code etc.) where
         a black-only hint disappears. */
      background: linear-gradient(rgba(0,0,0,0.08), transparent);
      border-top: 2px solid rgba(255,255,255,0.55);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      transition: background 0.2s, border-color 0.2s;
    }
    .titlebar:hover {
      background: linear-gradient(rgba(0,0,0,0.22), transparent);
      border-top-color: rgba(255,255,255,0.85);
    }
    .controls {
      /* glued to the avatar panel's right edge with a % offset, so it tracks the
         panel at any window size without a CSS transform (panel = 280/420 wide,
         centered → its right edge sits 16.667% in from the window's right edge) */
      position: fixed; top: 6px; right: calc(16.667% + 4px);
      display: flex; gap: 4px; z-index: 102; -webkit-app-region: no-drag;
    }
    .ctrl-btn {
      width: 18px; height: 18px; padding: 0; border: none; border-radius: 50%;
      background: rgba(0,0,0,0.3); color: #fff; font: 12px/18px sans-serif;
      text-align: center; cursor: pointer; opacity: 0;
      transition: opacity .2s, background .2s;
    }
    body:hover .ctrl-btn { opacity: 1; }
    .ctrl-btn:hover { background: rgba(0,0,0,0.55); }
    .close-btn:hover { background: #ff5470; }
    /* Volume popover: custom vertical slider (a rotated <input> needs a CSS
       transform, which ghosts on the transparent window — so honest DOM: track
       + fill). Absolute child of .controls, so it's outside the flex row and
       must be added to the click-through zone list when open. */
    .vol-pop {
      display: none; position: absolute; top: 24px; left: 0; width: 18px;
      padding: 8px 0 3px; border-radius: 9px; background: rgba(0,0,0,0.45);
      flex-direction: column; align-items: center; gap: 4px;
      -webkit-app-region: no-drag;
    }
    .vol-pop.open { display: flex; }
    #vol-track {
      width: 4px; height: 64px; border-radius: 2px;
      background: rgba(255,255,255,0.3); position: relative; cursor: pointer;
      /* widen the hit area without widening the visible track */
      box-shadow: 0 0 0 6px transparent;
    }
    #vol-fill {
      position: absolute; bottom: 0; left: 0; width: 100%;
      border-radius: 2px; background: #fff; height: 100%;
    }
    #vol-num { font: 9px/1 sans-serif; color: #fff; opacity: 0.85; }
    /* Onboarding flash: for the first seconds after launch the chrome shows itself —
       the −/+/✕ buttons and a "drag area" hint — then fades back to hover-only,
       so a first-time user learns where to grab without the chrome nagging after. */
    #drag-hint {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      height: 28px; line-height: 28px; white-space: nowrap;
      font: 12px sans-serif; color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      opacity: 0; transition: opacity 0.5s;
      pointer-events: none;
    }
    body.intro #drag-hint { opacity: 1; }
    body.intro .ctrl-btn { opacity: 1; }
    /* The avatar fills the window proportionally (panel = 66.667% wide, centered),
       so the −/+ controls just resize the OS window and Live2D refits — no scaling
       transform on the WebGL canvas (which ghosts on an unfocused transparent
       window and breaks click-through hit-testing). */
    /* Stack: a fully TRANSPARENT base rectangle (its own layer — never merged into
       the canvas, since merging let the opaque body punch a body-shaped hole on
       idle) with the avatar canvas stacked on top. Transparent so the desktop
       shows through and clicks pass behind the whole avatar — the point of a
       desktop pet. The earlier white edge-fringe came from the model's edges
       blending with the faintly-grey 0.15 panel; with NO grey to blend into, the
       edges fade into nothing, so it should be clean AND see-through. */
    #avatar-bg {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      transform: translate3d(-50%, 0, 0);
      width: 66.667%;
      background: transparent;               /* see-through + click-through; only the avatar shows */
    }
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
    }
    #speech-bubble {
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 2px solid #333;
      border-radius: 12px;
      padding: 6px 12px;
      font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
      font-size: 12px;
      line-height: 1.35;   /* deterministic, so caption pagination can budget 4 lines */
      max-width: 380px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 101;   /* above the titlebar (100) so its backdrop blur doesn't frost the bubble */
      pointer-events: none;
      display: -webkit-box;
      line-clamp: 4;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    #speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid #333;
    }
    #speech-bubble.visible { opacity: 1; }
  </style>
</head>
<body>
  <div class="titlebar" data-tauri-drag-region>
    <div id="drag-hint">⟵ This is Drag Area ⟶</div>
  </div>
  <div class="controls">
    <button id="vol-btn" class="ctrl-btn" title="Volume">🔊</button>
    <button id="zoom-out" class="ctrl-btn" title="Smaller">−</button>
    <button id="zoom-in" class="ctrl-btn" title="Bigger">+</button>
    <button id="close-btn" class="ctrl-btn close-btn" title="Close VAPE">✕</button>
    <div id="vol-pop" class="vol-pop">
      <div id="vol-track"><div id="vol-fill"></div></div>
      <div id="vol-num">100</div>
    </div>
  </div>
  <div id="container">
    <div id="avatar-bg"></div>
    <div id="speech-bubble"></div>
    <canvas id="canvas"></canvas>
  </div>

  <script src="lib/live2dcubismcore.min.js"></script>
  <script src="node_modules/pixi.js/dist/browser/pixi.min.js"></script>
  <script src="node_modules/pixi-live2d-display/dist/cubism4.min.js"></script>

  <script>
    const Live2DModel = PIXI.live2d.Live2DModel;
    const MotionPreloadStrategy = PIXI.live2d.MotionPreloadStrategy;

    // Self-expression motions (laugh, giggle, …) play at FORCE priority and animate eye/mouth
    // params. By default the library re-applies the active feeling expression AFTER the motion
    // each frame, so any feeling that Overwrites PARAM_EYE_*/PARAM_MOUTH_OPEN_Y masks the motion.
    // Flipping this makes the library auto-suspend the feeling (resetExpression) while a motion
    // with priority > IDLE(1) plays and auto-restore it (restoreExpression) on finish. The
    // always-on idle is IDLE(1) and never finishes, so feelings at rest are untouched.
    PIXI.live2d.config.preserveExpressionOnMotion = false;

    const speechBubble = document.getElementById('speech-bubble');
    const canvas = document.getElementById('canvas');

    // Served same-origin by the VAPE server; fall back to ?port= for dev.
    const params = new URLSearchParams(window.location.search);
    const WS_HOST = window.location.host || `localhost:${params.get('port') || '5111'}`;
    const WS_BASE = `ws://${WS_HOST}`;

    let model = null;
    let app = null;
    let currentFeeling = null;      // last feeling applied — re-applied after looping actions
    let selfExprRestoreTimer = null;
    let baseW = 0, baseH = 0;       // intrinsic model size (scale 1), captured after load
    const PANEL_FRAC = 280 / 420;   // avatar panel width as a fraction of the window

    // Re-render Live2D at the current window size. Runs on launch and on every
    // window resize (the −/+ controls just resize the OS window). The model keeps
    // its aspect ratio and the canvas backing store is resized, so it stays crisp
    // at any size — no CSS transform on the WebGL canvas.
    function fitModel() {
      if (!app) return;
      const w = window.innerWidth, h = window.innerHeight;
      app.renderer.resize(w, h);
      if (!model || !baseW) return;
      const s = Math.min((w * PANEL_FRAC) / baseW, h / baseH) * 0.95;
      model.scale.set(s);
      model.x = w / 2;
      model.y = h * 0.52;   // pushed down for more bubble headroom (tunable)
    }
    window.addEventListener('resize', fitModel);

    // ─── Expression map ────────────────────────────────────
    const EXPRESSION_MAP = {
      normal: 'Normal', happy: 'Happy', sad: 'Sad', angry: 'Angry',
      frustrated: 'Frustrated', curious: 'Curious', proud: 'Proud',
      anxious: 'Anxious', excited: 'Excited', calm: 'Calm',
      bored: 'Bored', blushing: 'Blushing',
      surprised: 'Surprised', content: 'Content',
    };

    const SELF_EXPRESSION_MAP = {
      nod: 0, head_shake: 1, head_tilt: 2, laugh: 3, giggle: 4,
      gasp: 5, think: 6, celebrate: 7, wave: 8, bow: 9,
      starry: 10, clap: 11, cry_hands: 12,
    };

    function setExpression(name) {
      if (!model) return;
      const exprName = EXPRESSION_MAP[name];
      if (!exprName) return;
      const em = model.internalModel.motionManager.expressionManager;
      const idx = em?.definitions?.findIndex(d => d.Name === exprName);
      if (idx >= 0) {
        currentFeeling = name;   // remember it so looping actions can re-apply it
        model.expression(idx);
        // Tears follow the feeling: gentle track on sad, off on anything else
        // (a real cry-burst escalates this via triggerCry / the cry action).
        if (name === 'sad') { if (tearMode !== 'cry') setTearMode('gentle'); }
        else { clearTimeout(cryTimer); setTearMode('off'); }
      }
    }

    function playSelfExpression(name) {
      if (!model) return;
      const idx = SELF_EXPRESSION_MAP[name];
      if (idx === undefined) return;

      // FORCE(3): with preserveExpressionOnMotion=false the library resets the feeling now and
      // restores it on finish — for NON-looping motions. Looping ones (head_tilt/think/starry)
      // never finish, so re-apply the feeling ourselves after one loop's length.
      model.motion('SelfExpression', idx, 3);

      clearTimeout(selfExprRestoreTimer);
      const motion = model.internalModel.motionManager.motionGroups?.SelfExpression?.[idx];
      if (motion && typeof motion.isLoop === 'function' && motion.isLoop() && currentFeeling) {
        const feelingAtStart = currentFeeling;
        const loopMs = Math.max(motion.getLoopDuration() * 1000, 1500); // guards getDuration()===-1
        selfExprRestoreTimer = setTimeout(() => {
          if (currentFeeling === feelingAtStart) setExpression(feelingAtStart); // skip if superseded
        }, loopMs);
      }
    }

    // ─── Tear overlay (conditional: gentle on sad, full on cry) ────────────
    // No tear art exists in the Shizuku rig, so tears are a sprite layer drawn on
    // the model's own Pixi stage (so they scale + move with her). gentle = one slow
    // tear track on `sad`; cry = both eyes streaming, fired by the `cry` action.
    // Tunables are fractions of the model's displayed size, so they hold at any zoom.
    const TEAR_TEX = {
      gentle: PIXI.Texture.from('assets/tear.png'),       // slim, quiet sad
      cry:    PIXI.Texture.from('assets/tear_cry.png'),   // rounded + bluer, full cry
    };
    const TEAR_TUNE = { eyeL: -0.128, eyeR: 0.085, eyeDY: -0.15, fall: 0.18 };
    const TEAR_CFG = {
      gentle: { interval: 1.2,  eyes: ['L', 'R'], texH: 236, size: 0.050 },
      cry:    { interval: 0.18, eyes: ['L', 'R'], texH: 210, size: 0.062 },
    };
    let tearLayer = null, tears = [], tearMode = 'off', tearAcc = 0, cryTimer = null;

    // Sad face (Sad.exp3.json values), forced every frame during a cry so the arm
    // motion's expression-suspend can't leave her default smile showing.
    const SAD_FACE = {
      PARAM_EYE_L_OPEN: 0.5, PARAM_EYE_R_OPEN: 0.5, PARAM_EYE_BALL_Y: 0.4,
      PARAM_BROW_L_Y: 0.2, PARAM_BROW_R_Y: 0.2, PARAM_BROW_L_ANGLE: 0.5, PARAM_BROW_R_ANGLE: 0.5,
      PARAM_BROW_L_FORM: -0.7, PARAM_BROW_R_FORM: -0.7, PARAM_MOUTH_FORM: -0.4, PARAM_MOUTH_OPEN_Y: 0.0,
      PARAM_TERE: 0.3, PARAM_DONYORI: 0.5,
    };

    function dispSize() { return { w: baseW * model.scale.x, h: baseH * model.scale.y }; }

    function spawnTear(eye) {
      const { w, h } = dispSize();
      const cfg = TEAR_CFG[tearMode];
      const dx = eye === 'L' ? TEAR_TUNE.eyeL : TEAR_TUNE.eyeR;
      const s = new PIXI.Sprite(TEAR_TEX[tearMode]);
      s.anchor.set(0.5, 0.0);
      s.scale.set((h * cfg.size) / cfg.texH * (0.9 + Math.random() * 0.2));
      s.x = model.x + w * dx;
      s.y = model.y + h * TEAR_TUNE.eyeDY;
      s._y0 = s.y; s._fall = h * TEAR_TUNE.fall; s._vy = h * 0.003; s._t = 0; s.alpha = 0;
      tearLayer.addChild(s); tears.push(s);
    }

    function updateTears(delta) {
      if (!model || !tearLayer) return;
      const { h } = dispSize();
      const cfg = TEAR_CFG[tearMode];
      if (cfg) {
        tearAcc += delta / 60;                 // delta ~ frames at 60fps -> seconds
        if (tearAcc >= cfg.interval) { tearAcc = 0; cfg.eyes.forEach(spawnTear); }
      }
      for (let i = tears.length - 1; i >= 0; i--) {
        const s = tears[i];
        s._t += delta;
        s._vy += h * 0.0003 * delta;           // gravity
        s.y += s._vy * delta;
        const prog = (s.y - s._y0) / s._fall;  // 0 at the eye -> 1 down the cheek
        s.alpha = Math.min(1, s._t / 8) * Math.max(0, 1 - prog) * 0.95;
        if (prog >= 1) { tearLayer.removeChild(s); s.destroy(); tears.splice(i, 1); }
      }
    }

    function setTearMode(mode) {
      if (tearMode === mode) return;
      tearMode = mode;
      tearAcc = mode === 'off' ? 0 : Math.max(0, TEAR_CFG[mode].interval - 0.1);
    }

    function triggerCry() {
      setExpression('sad');                    // the crying face
      setTearMode('cry');
      playSelfExpression('cry_hands');         // celebrate's clean arm-raise, but with the sad face
      clearTimeout(cryTimer);
      cryTimer = setTimeout(() => setTearMode(currentFeeling === 'sad' ? 'gentle' : 'off'), 5000);
    }

    // ─── Audio queue + lip sync via AnalyserNode ───────────
    // Shizuku's idle motions keyframe PARAM_MOUTH_OPEN_Y, so writing the
    // mouth value from a separate RAF loop loses the race — the motion
    // overwrites it inside the model's update step. Instead, we compute
    // smoothedMouth in RAF but apply it inside the 'beforeModelUpdate'
    // event the library emits after motions/expressions/physics, just
    // before the model renders. That's the only point where our value wins.
    let audioCtx = null;
    let analyser = null;
    let gainNode = null;
    let lipSyncActive = false;
    let smoothedMouth = 0;
    let playQueue = [];
    let isPlaying = false;

    function startLipSync() {
      if (lipSyncActive) return;
      lipSyncActive = true;
      const dataArray = new Uint8Array(analyser.fftSize);

      function update() {
        if (!lipSyncActive || !model) return;
        analyser.getByteTimeDomainData(dataArray);
        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) {
          const v = (dataArray[i] - 128) / 128;
          sum += v * v;
        }
        const rms = Math.sqrt(sum / dataArray.length);
        const gated = rms < 0.02 ? 0 : rms;
        const target = Math.min(Math.sqrt(gated * 8) * 1.2, 1);
        if (target > smoothedMouth) {
          smoothedMouth += (target - smoothedMouth) * 0.8;
        } else {
          smoothedMouth += (target - smoothedMouth) * 0.3;
        }
        requestAnimationFrame(update);
      }
      update();
    }

    function stopLipSync() {
      lipSyncActive = false;
      smoothedMouth = 0;
    }

    // ─── Bubble caption: page a long utterance so it never covers her face ──
    // The VOICE stays one natural utterance (a whole sentence); only the CAPTION
    // pages, advancing in sync with this clip's playback — weighted by syllables
    // (vowel groups ≈ suku kata), since speech duration tracks syllables better
    // than characters. Pages are sized by MEASURING true content height against a
    // 4-line budget, with the clamp toggled OFF during measurement so scrollHeight
    // reports the full height (measuring against the *clamped* height was the bug
    // that produced word-by-word paging).
    function countSyllables(str) {
      const m = str.toLowerCase().match(/[aeiou]+/g);
      return m ? m.length : 1;
    }

    function paginateToFit(text) {
      const el = speechBubble;
      const prevClamp = el.style.webkitLineClamp;
      el.style.webkitLineClamp = '9999';                 // measure true height
      const cs = getComputedStyle(el);
      const lineH = parseFloat(cs.lineHeight) || 16;
      const padV = (parseFloat(cs.paddingTop) || 0) + (parseFloat(cs.paddingBottom) || 0);
      const budget = lineH * 4 + padV + 1;               // 4-line bubble incl. padding
      // Pass 1 — greedy fill by MEASURED height, only to COUNT pages needed.
      let n = 0, cur = '';
      for (const w of text.split(/\s+/)) {
        const test = cur ? cur + ' ' + w : w;
        el.textContent = test;
        if (el.scrollHeight > budget && cur) { n++; cur = w; }
        else cur = test;
      }
      if (cur) n++;
      el.style.webkitLineClamp = prevClamp;              // restore display clamp
      if (n <= 1) return [text];
      // Pass 2 — balance into n EVEN pages by char target (each <= a height-fit
      // page, so guaranteed to fit), so no tiny orphan trails the last page.
      const target = Math.ceil(text.length / n);
      const pages = [];
      cur = '';
      for (const w of text.split(/\s+/)) {
        const test = cur ? cur + ' ' + w : w;
        if (cur && test.length > target && pages.length < n - 1) { pages.push(cur); cur = w; }
        else cur = test;
      }
      if (cur) pages.push(cur);
      return pages;
    }

    function showSpeech(audio, text) {
      const pages = paginateToFit(text);
      if (pages.length <= 1) { speechBubble.textContent = text; return; }
      const weights = pages.map(p => Math.max(countSyllables(p), 1));
      const total = weights.reduce((a, b) => a + b, 0);
      const ends = [];                                   // cumulative end-fraction per page
      let acc = 0;
      for (const w of weights) { acc += w; ends.push(acc / total); }
      speechBubble.textContent = pages[0];
      let shown = 0;
      audio.addEventListener('timeupdate', () => {
        const d = audio.duration;
        if (!d || !isFinite(d)) return;
        const frac = audio.currentTime / d;
        let idx = ends.findIndex(e => frac < e);
        if (idx === -1) idx = pages.length - 1;
        if (idx !== shown) { shown = idx; speechBubble.textContent = pages[idx]; }
      });
    }

    async function processQueue() {
      if (playQueue.length === 0) {
        isPlaying = false;
        stopLipSync();
        setTimeout(() => {
          if (!isPlaying) {
            speechBubble.classList.remove('visible');
            // After the 0.3s opacity fade, drop the element entirely so the
            // transparent window can't retain a stale composited copy of it —
            // the empty "ghost bubble". Re-shown via display='' next utterance.
            setTimeout(() => {
              if (!isPlaying) { speechBubble.style.display = 'none'; speechBubble.textContent = ''; }
            }, 350);
          }
        }, 500);
        return;
      }

      isPlaying = true;
      const { url, text, volume } = playQueue.shift();

      // The audio graph is rebuilt fresh for EVERY utterance. A long-lived
      // AudioContext survives the laptop's sleep with state still 'running',
      // but its CoreAudio output unit is dead — the element "plays" (captions
      // page, /audio fetches log 206) while no sound reaches the speakers.
      // The same staleness hits when the default output device changes
      // (AirPods off, HDMI out). A fresh context binds to the CURRENT default
      // device every time; the old one is closed so contexts never pile up.
      if (audioCtx) { try { audioCtx.close(); } catch {} }
      audioCtx = new AudioContext();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      // Gain sits AFTER the analyser tap, so volume never shrinks the lipsync
      // signal — a whisper still moves the mouth at full amplitude.
      gainNode = audioCtx.createGain();
      analyser.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      gainNode.gain.value = (volume ?? 100) / 100;
      // Some webviews start the AudioContext suspended (WebKit also has an
      // 'interrupted' state); resume anything not running before playing, or
      // the analyser reads silence and the mouth never moves.
      if (audioCtx.state !== 'running') {
        try { await audioCtx.resume(); } catch {}
      }

      const audio = new Audio(url);
      const source = audioCtx.createMediaElementSource(audio);
      source.connect(analyser);

      // Caption set up AFTER the audio exists, so a long sentence pages its
      // caption in sync with this clip's playback (see showSpeech).
      if (text) {
        speechBubble.style.display = '';   // restore (CSS: -webkit-box) — display:none'd on hide to kill the ghost
        showSpeech(audio, text);           // measures scrollHeight, so must run while displayed
        void speechBubble.offsetHeight;    // reflow so the opacity fade-in plays from 0
        speechBubble.classList.add('visible');
      }

      startLipSync();

      audio.addEventListener('ended', processQueue);
      audio.addEventListener('error', processQueue);
      audio.play().catch(processQueue);
    }

    function queueAudio(url, text, volume) {
      playQueue.push({ url, text, volume });
      if (!isPlaying) processQueue();
    }

    // ─── WebSocket connections ──────────────────────────────
    function connectStatusWS() {
      const ws = new WebSocket(`${WS_BASE}/ws/status`);
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'feeling') setExpression(msg.name);
        else if (msg.type === 'action') {
          if (msg.name === 'cry') triggerCry();
          else playSelfExpression(msg.name);
        }
      };
      ws.onclose = () => setTimeout(connectStatusWS, 2000);
      ws.onerror = () => ws.close();
    }

    function connectAudioWS() {
      const ws = new WebSocket(`${WS_BASE}/ws/audio`);
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'audio') queueAudio(msg.url, msg.text, msg.volume);
      };
      ws.onclose = () => setTimeout(connectAudioWS, 2000);
      ws.onerror = () => ws.close();
    }

    // ─── Close button ──────────────────────────────────────
    function closeApp() {
      // Stop the server, then close the window (works in Electron, Tauri, browser).
      fetch('/api/shutdown', { method: 'POST' }).catch(() => {}).finally(closeWindow);
    }
    function closeWindow() {
      try {
        const t = window.__TAURI__;
        if (t) {
          const api = t.window || t.webviewWindow;
          const cur = api && (api.getCurrentWindow ? api.getCurrentWindow() : (api.getCurrent ? api.getCurrent() : null));
          if (cur && cur.close) { cur.close(); return; }
        }
      } catch (e) {}
      window.close();
    }
    document.getElementById('close-btn').addEventListener('click', closeApp);

    // ─── Resize (−/+) ──────────────────────────────────────
    // The shell resizes the OS window; the renderer re-renders Live2D at the new
    // pixel size (see fitModel). No CSS transform on the WebGL canvas — that
    // ghosts on an unfocused transparent window and offsets click-through
    // hit-testing. The chosen scale is remembered across restarts via localStorage
    // (per-origin, shared by both shells on http://localhost:<port>).
    const DESIGN_W = 420, DESIGN_H = 400;
    const SCALE_MIN = 0.6, SCALE_MAX = 1.8, SCALE_STEP = 0.15;
    let uiScale = parseFloat(localStorage.getItem('vape-scale'));
    if (!(uiScale >= SCALE_MIN && uiScale <= SCALE_MAX)) uiScale = 1;

    function applyScale() {
      const w = Math.round(DESIGN_W * uiScale);
      const h = Math.round(DESIGN_H * uiScale);
      if (window.vapeShell && window.vapeShell.resize) window.vapeShell.resize(w, h);
      else if (window.__TAURI__ && window.__TAURI__.core)
        window.__TAURI__.core.invoke('vape_resize', { width: w, height: h }).catch(() => {});
    }
    function setScale(next) {
      uiScale = Math.max(SCALE_MIN, Math.min(SCALE_MAX, Math.round(next * 100) / 100));
      localStorage.setItem('vape-scale', String(uiScale));
      applyScale();
    }
    document.getElementById('zoom-in').addEventListener('click', () => setScale(uiScale + SCALE_STEP));
    document.getElementById('zoom-out').addEventListener('click', () => setScale(uiScale - SCALE_STEP));
    applyScale(); // restore the remembered window size on launch (fitModel follows on resize)

    // Click-through everywhere except the chrome: the avatar body lets mouse
    // events pass to whatever is behind the window; the drag strip + controls
    // re-enable interaction while hovered. No-op outside Electron.
    document.querySelectorAll('.titlebar, .controls').forEach((el) => {
      el.addEventListener('mouseenter', () => window.vapeShell && window.vapeShell.setIgnoreMouse(false));
      el.addEventListener('mouseleave', () => window.vapeShell && window.vapeShell.setIgnoreMouse(true));
    });

    // Tauri can't forward mouse moves while click-through, so the renderer
    // reports its interactive rects and the shell hit-tests the cursor itself.
    // (.vol-pop reports 0x0 while hidden — harmless; re-reported on toggle.)
    let reportZonesFn = null;
    if (window.__TAURI__ && window.__TAURI__.core) {
      const reportZones = () => {
        const zones = [...document.querySelectorAll('.titlebar, .controls, .vol-pop')].map((el) => {
          const r = el.getBoundingClientRect();
          return [r.left, r.top, r.width, r.height];
        });
        window.__TAURI__.core.invoke('vape_set_zones', { zones }).catch(() => {});
      };
      reportZonesFn = reportZones;
      reportZones();
      setTimeout(reportZones, 500);
      window.addEventListener('resize', reportZones);
    }

    // ─── Volume popover: the STANDING volume, by hand ──────
    // The slider reads/writes /api/volume (config tts.volume) — same knob as
    // `vape volume`, so CLI and chrome never disagree. Dragging also live-sets
    // the gain so a playing utterance responds instantly.
    const volPop = document.getElementById('vol-pop');
    const volTrack = document.getElementById('vol-track');
    const volFill = document.getElementById('vol-fill');
    const volNum = document.getElementById('vol-num');
    let volLevel = 100;
    let volSaveTimer = null;

    function volRender() {
      volFill.style.height = volLevel + '%';
      volNum.textContent = String(volLevel);
    }
    async function volLoad() {
      try {
        const d = await (await fetch('/api/volume')).json();
        if (typeof d.volume === 'number') { volLevel = d.volume; volRender(); }
      } catch {}
    }
    function volSave() {
      clearTimeout(volSaveTimer);
      volSaveTimer = setTimeout(() => {
        fetch('/api/volume', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ volume: volLevel }),
        }).catch(() => {});
      }, 150);
    }
    function volFromEvent(e) {
      const r = volTrack.getBoundingClientRect();
      const frac = 1 - (e.clientY - r.top) / r.height;
      volLevel = Math.max(0, Math.min(100, Math.round(frac * 100)));
      volRender();
      if (gainNode) gainNode.gain.value = volLevel / 100;
      volSave();
    }
    volTrack.addEventListener('pointerdown', (e) => {
      volTrack.setPointerCapture(e.pointerId);
      volFromEvent(e);
      const move = (ev) => volFromEvent(ev);
      const up = () => {
        volTrack.removeEventListener('pointermove', move);
        volTrack.removeEventListener('pointerup', up);
      };
      volTrack.addEventListener('pointermove', move);
      volTrack.addEventListener('pointerup', up);
    });
    document.getElementById('vol-btn').addEventListener('click', () => {
      volPop.classList.toggle('open');
      if (volPop.classList.contains('open')) volLoad();
      if (reportZonesFn) reportZonesFn();
    });

    // Onboarding flash: show the −/+/✕ controls and the drag-area hint for the
    // first 3 seconds after launch, then fade back to the hover-only chrome.
    document.body.classList.add('intro');
    setTimeout(() => document.body.classList.remove('intro'), 3000);

    // ─── Initialize Live2D ─────────────────────────────────
    async function init() {
      app = new PIXI.Application({
        view: canvas,
        transparent: true,
        width: window.innerWidth,
        height: window.innerHeight,
        resolution: window.devicePixelRatio || 1,
        autoDensity: true,
      });

      try {
        model = await Live2DModel.from('shizuku/runtime/shizuku.model3.json', {
          motionPreload: MotionPreloadStrategy.ALL,
        });

        model.anchor.set(0.5, 0.5);
        baseW = model.width;   // intrinsic size at scale 1, before we refit
        baseH = model.height;

        model.internalModel.eyeBlink = null;
        app.stage.addChild(model);
        model.motion('Idle', 0);
        fitModel(); // size the model + canvas to the current window

        // Tear overlay sits above the model on the same stage; ticker drives the fall.
        tearLayer = new PIXI.Container();
        app.stage.addChild(tearLayer);
        app.ticker.add(updateTears);

        // Lip-sync drives the mouth at the only point that wins the frame:
        // after motions/expressions/physics, just before render. But ONLY while
        // speaking. Frame order is idle-motion -> expression -> here, so an
        // active feeling's PARAM_MOUTH_OPEN_Y already beats the idle motion. If
        // we also wrote it while silent (smoothedMouth = 0) we'd pin every
        // expression's mouth shut, and shizuku's smile reads through an OPEN
        // mouth -> no feeling could ever smile at rest. So override only when
        // lip-sync is live; otherwise let the expression's open mouth stand.
        model.internalModel.on('beforeModelUpdate', () => {
          const cm = model.internalModel.coreModel;
          // While crying, pin the sad face every frame (the arm motion suspends the
          // feeling expression, which would otherwise let her default smile show).
          if (tearMode === 'cry') {
            for (const id in SAD_FACE) cm.setParameterValueById(id, SAD_FACE[id]);
          }
          if (lipSyncActive) {
            cm.setParameterValueById('PARAM_MOUTH_OPEN_Y', smoothedMouth);
          }
        });

        connectStatusWS();
        connectAudioWS();
      } catch (err) {
        document.body.innerHTML = `<div style="color:red;padding:20px;font-size:14px;">
          Failed to load model:<br>${err.message}
        </div>`;
      }
    }

    init();
  </script>
</body>
</html>
